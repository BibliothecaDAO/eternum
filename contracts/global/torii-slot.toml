world_address = "0x0172e470e28b6ad5f4c397019a3aca0c9b451a5e06f5255fbb8c4eefcd6f2b58"
rpc = "https://api.cartridge.gg/x/eternum-blitz-slot-4/katana/rpc/v0_9"

[server]
http_cors_origins = ["*"]

[indexing]
controllers = true
index_pending = false
polling_interval = 500
max_concurrent_tasks = 8
events_chunk_size = 128
contracts = [
    "ERC20:0x00065804c556e4d5f76ccefd389c83b017addac8358ff61e58247e1995385bef",    # mmr token
]
namespaces = ["pm"]

# Start from world deployment block to avoid expensive full-chain scan from block 0.
world_block = 127563

[sql]
historical = [
    "pm-MarketBuy",
    "pm-PayoutRedemption",
    "pm-VaultNumerator",
    "pm-VaultDenominator",
    "pm-VaultNumeratorEvent",
    "pm-VaultDenominatorEvent",
]
all_model_indices = false

hooks = [
    { event = { ModelRegistered = { model_tag = "pm-Market" } }, statement = "CREATE INDEX IF NOT EXISTS [idx_events_mmr_player_latest] ON events (lower(substr(lower(keys), instr(lower(keys), '/') + 1, instr(substr(lower(keys), instr(lower(keys), '/') + 1), '/') - 1)), executed_at DESC, id DESC) WHERE ltrim(substr(lower(keys), 1, instr(lower(keys), '/') - 1), '0x') = ltrim('0x16f4294f4d138f6ce05f6157837f2607fdb74f7f25e8d8f4be4e933309f4d37', '0x') AND lower(substr(substr(id, instr(id, ':') + 1), instr(substr(id, instr(id, ':') + 1), ':') + 1, instr(substr(substr(id, instr(id, ':') + 1), instr(substr(id, instr(id, ':') + 1), ':') + 1), ':') - 1)) = '0x00065804c556e4d5f76ccefd389c83b017addac8358ff61e58247e1995385bef'" },
    { event = { ModelRegistered = { model_tag = "pm-Market" } }, statement = "CREATE INDEX IF NOT EXISTS [idx_events_mmr_latest_time] ON events (executed_at DESC, id DESC) WHERE ltrim(substr(lower(keys), 1, instr(lower(keys), '/') - 1), '0x') = ltrim('0x16f4294f4d138f6ce05f6157837f2607fdb74f7f25e8d8f4be4e933309f4d37', '0x') AND lower(substr(substr(id, instr(id, ':') + 1), instr(substr(id, instr(id, ':') + 1), ':') + 1, instr(substr(substr(id, instr(id, ':') + 1), instr(substr(id, instr(id, ':') + 1), ':') + 1), ':') - 1)) = '0x00065804c556e4d5f76ccefd389c83b017addac8358ff61e58247e1995385bef'" },
]

[[sql.model_indices]]
model_tag = "pm-Market"
fields = ["start_at", "resolve_at", "resolved_at", "oracle"]

[[sql.model_indices]]
model_tag = "pm-MarketCreated"
fields = ["market_id"]

[[sql.model_indices]]
model_tag = "pm-VaultDenominator"
fields = ["market_id"]

[[sql.model_indices]]
model_tag = "pm-VaultNumerator"
fields = ["market_id", "index"]

[[sql.model_indices]]
model_tag = "pm-MarketBuy"
fields = ["market_id"]

[[sql.model_indices]]
model_tag = "pm-PayoutRedemption"
fields = ["condition_id"]

[events]
raw = true
