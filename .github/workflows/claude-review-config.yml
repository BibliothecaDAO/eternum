name: Claude Review - Configuration & Infrastructure

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "config/**/*.{ts,js,json}"
      - ".github/**/*"
      - "deploy/**/*"
      - "docker-compose*"
      - "Dockerfile*"
      - "scripts/**/*"
      - "**/package.json"
      - "pnpm-*.yaml"

jobs:
  claude-review-config:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup GitHub MCP Server
        run: |
          mkdir -p /tmp/mcp-config
          cat > /tmp/mcp-config/mcp-servers.json << 'EOF'
          {
            "mcpServers": {
              "github": {
                "command": "docker",
                "args": [
                  "run",
                  "-i",
                  "--rm",
                  "-e",
                  "GITHUB_PERSONAL_ACCESS_TOKEN",
                  "ghcr.io/github/github-mcp-server:latest"
                ],
                "env": {
                  "GITHUB_PERSONAL_ACCESS_TOKEN": "${{ secrets.GH_PAT }}"
                }
              }
            }
          }
          EOF

      - name: Run Claude Config Code Review
        id: claude-review
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: "claude-sonnet-4-6"
          timeout_minutes: "10"
          mcp_config: /tmp/mcp-config/mcp-servers.json

          direct_prompt: |
            Review this configuration and infrastructure PR for Eternum focusing on:

            **Security & Secrets:**
            - No secrets, private keys, or API keys committed
            - Proper .env handling and GitHub secrets usage
            - Container security and minimal attack surface
            - Dependency vulnerability concerns

            **Multi-Environment Consistency:**
            - Local (Katana), Sepolia, Mainnet, Slot configs stay in sync
            - Environment-specific addresses in contracts/common/addresses/
            - Dojo config validation (Scarb.toml, dojo_*.toml)
            - Network endpoint configuration and fallbacks

            **Deployment Safety:**
            - Migration script reliability and rollback strategies
            - Docker configuration optimization
            - Build script efficiency and caching
            - Manifest file consistency

            **CI/CD Efficiency:**
            - Workflow efficiency and build caching
            - Secret usage and security in workflows
            - pnpm workspace and dependency management
            - Lock file integrity

            Focus on reliability, security, and deployment safety.

          allowed_tools: "mcp__github__get_issue,mcp__github__get_issue_comments,mcp__github__update_issue,mcp__github__search_issues,mcp__github__list_issues,mcp__github__create_issue,mcp__github__get_pull_request,mcp__github__list_pull_requests,mcp__github__create_pull_request,mcp__github__update_pull_request,mcp__github__get_file_contents,mcp__github__update_file,mcp__github__create_branch,mcp__github__list_branches,mcp__github__get_repository,mcp__github__list_repositories,mcp__github__search_repositories,mcp__github__get_user,mcp__github__list_commits,mcp__github__create_comment,mcp__github__list_comments,mcp__github__update_comment,mcp__github__delete_comment"

          custom_instructions: |
            You are reviewing infrastructure and configuration for Eternum, a blockchain gaming project.
            Key infra: Dojo framework (Cairo), multi-network deployment (Katana/Sepolia/Mainnet), Torii indexing, pnpm monorepo.
            Focus on security, environment consistency, and deployment reliability.
