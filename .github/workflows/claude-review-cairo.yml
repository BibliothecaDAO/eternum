name: Claude Review - Cairo Contracts

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "contracts/**/*.cairo"
      - "contracts/**/Scarb.toml"
      - "contracts/**/dojo*.toml"
      - "contracts/**/manifest*.json"

jobs:
  claude-review-cairo:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup GitHub MCP Server
        run: |
          mkdir -p /tmp/mcp-config
          cat > /tmp/mcp-config/mcp-servers.json << 'EOF'
          {
            "mcpServers": {
              "github": {
                "command": "docker",
                "args": [
                  "run",
                  "-i",
                  "--rm",
                  "-e",
                  "GITHUB_PERSONAL_ACCESS_TOKEN",
                  "ghcr.io/github/github-mcp-server:latest"
                ],
                "env": {
                  "GITHUB_PERSONAL_ACCESS_TOKEN": "${{ secrets.GH_PAT }}"
                }
              }
            }
          }
          EOF

      - name: Run Claude Cairo Code Review
        id: claude-review
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: "claude-sonnet-4-6"
          timeout_minutes: "10"
          mcp_config: /tmp/mcp-config/mcp-servers.json

          direct_prompt: |
            Review this Cairo smart contract PR for Eternum focusing on:

            **Security & Exploits:**
            - Access control and ownership validation
            - Input validation and bounds checking (resource amounts, coordinates)
            - Integer overflow/underflow in resource calculations
            - Economic exploits: infinite resources, duplicate spending, unfair advantage
            - Proper use of assert vs require

            **Cairo/Dojo Patterns:**
            - Correct component/system architecture following Dojo conventions
            - Models in src/models/, systems in src/systems/
            - Storage optimization and gas efficiency
            - Event emission for Torii indexing

            **Game Logic Correctness:**
            - Resource production rates, decay, transfer limits, arrival calculations
            - Military: troop costs, battle mechanics, army movement
            - Economic: trading, market orders, liquidity, bank operations
            - Structures: building costs, settlement mechanics, hyperstructures
            - Mathematical accuracy in game formulas (contracts/game/ext/formulas/)

            **Test Coverage:**
            - Unit tests in src/systems/*/tests/
            - Edge cases and error scenarios
            - Integration tests for system interactions
            - Test data consistency with game balance

            CRITICAL: Pay special attention to economic exploits, game balance, and resource integrity.

          allowed_tools: "mcp__github__get_issue,mcp__github__get_issue_comments,mcp__github__update_issue,mcp__github__search_issues,mcp__github__list_issues,mcp__github__create_issue,mcp__github__get_pull_request,mcp__github__list_pull_requests,mcp__github__create_pull_request,mcp__github__update_pull_request,mcp__github__get_file_contents,mcp__github__update_file,mcp__github__create_branch,mcp__github__list_branches,mcp__github__get_repository,mcp__github__list_repositories,mcp__github__search_repositories,mcp__github__get_user,mcp__github__list_commits,mcp__github__create_comment,mcp__github__list_comments,mcp__github__update_comment,mcp__github__delete_comment"

          custom_instructions: |
            You are reviewing Cairo smart contracts for Eternum, a blockchain strategy game on Starknet using Dojo framework.

            Key context:
            - Resource management and strategy game with realms, armies, and trading
            - Uses $LORDS token for in-game economy
            - Seasonal gameplay with immutable on-chain state
            - Multi-environment: local (Katana), Sepolia, Mainnet

            Focus on economic exploits, game balance, resource integrity, and proper Dojo patterns.
