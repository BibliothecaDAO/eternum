name: Pre-Game Reminder

on:
  workflow_dispatch:
    inputs:
      game_start_timestamp:
        description: "Game start timestamp (Unix epoch)"
        required: true
        type: string
      reminder_minutes:
        description: "Minutes before game to send the reminder"
        required: false
        default: "5"
        type: string

jobs:
  reminder-disabled:
    name: Reminder Disabled
    runs-on: ubuntu-latest
    steps:
      - name: Explain current state
        run: |
          echo "Pre-game reminders are currently disabled."
          echo "This workflow stays manual-only so factory-runs branch updates do not create invalid runs."
          echo "Requested game start timestamp: ${{ github.event.inputs.game_start_timestamp }}"
          echo "Requested reminder minutes: ${{ github.event.inputs.reminder_minutes }}"
