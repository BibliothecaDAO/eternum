name: Factory Torii Deployer
run-name: >-
  Factory Torii Deployer / ${{ inputs.env || github.event.inputs.env || 'unknown' }} / ${{ inputs.torii_prefix ||
  github.event.inputs.torii_prefix || 'torii' }} / ${{ inputs.launch_request_id || github.event.inputs.launch_request_id
  || 'manual' }}

on:
  workflow_dispatch:
    inputs:
      operation:
        description: "Whether to deploy a new Torii instance or update an existing tier"
        required: false
        default: "deploy"
        type: choice
        options:
          - deploy
          - update-tier
      env:
        description: "Environment label (used for grouping outputs)"
        required: false
        default: "sepolia"
      torii_prefix:
        description: "Prefix for Torii name (will be trimmed if too long)"
        required: false
        default: "eternum-torii"
      torii_version:
        description: "Torii version to deploy"
        required: false
        default: "v1.8.15"
      slot_team:
        description: "Cartridge Slot team name"
        required: false
        default: "realms-eternum"
      torii_tier:
        description: "Cartridge Slot tier"
        required: false
        default: "basic"
      torii_name:
        description: "Existing Torii name (required when operation=update-tier)"
        required: false
        default: ""
      rpc_url:
        description: "Starknet RPC URL"
        required: false
      torii_world_address:
        description: "Torii world address (0x...)"
        required: false
      world_block:
        description: "Starting world block number"
        required: false
        default: "0"
      torii_namespaces:
        description: "Comma-separated namespaces (e.g. s1_eternum,ds_v1_2_0)"
        required: false
        default: "s1_eternum"
      torii_external_contracts:
        description: "External contracts to index (one per line: erc721:0x..., erc20:0x...)"
        required: false
        default: ""
      torii_replicas:
        description: "Torii replicas"
        required: false
        default: "2"
      launch_request_id:
        description: "Internal launch correlation id"
        required: false
        default: ""

permissions:
  contents: write

env:
  CI: "true"

jobs:
  deploy-torii:
    name: 🎯 Deploy Torii
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SLOT_AUTH: ${{ secrets.SLOT_AUTH }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Install Slot CLI
        run: |
          set -euo pipefail
          echo "Installing Slot CLI via slotup..."
          curl -L https://slot.cartridge.sh | bash
          ~/.config/.slot/bin/slotup
          echo "$HOME/.config/.slot/bin" >> $GITHUB_PATH
          echo "Slot version: $(~/.config/.slot/bin/slot --version)"

      - name: Validate workflow inputs
        run: |
          set -euo pipefail

          operation="${{ github.event.inputs.operation }}"

          if [ "$operation" = "update-tier" ]; then
            if [ -z "${{ github.event.inputs.torii_name }}" ]; then
              echo "❌ torii_name is required when operation=update-tier"
              exit 1
            fi
            exit 0
          fi

          if [ -z "${{ github.event.inputs.rpc_url }}" ]; then
            echo "❌ rpc_url is required when operation=deploy"
            exit 1
          fi

          if [ -z "${{ github.event.inputs.torii_world_address }}" ]; then
            echo "❌ torii_world_address is required when operation=deploy"
            exit 1
          fi

      - name: Compute Torii identifiers (name prefix + timestamped folder)
        id: name
        if: ${{ github.event.inputs.operation != 'update-tier' }}
        run: |
          set -euo pipefail
          prefix_raw="${{ github.event.inputs.torii_prefix }}"
          # sanitize prefix: lowercase, allow a-z0-9-
          prefix=$(echo "$prefix_raw" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]//g')

          # Torii name: prefix only (trim to max 29)
          max_name_len=29
          if [ ${#prefix} -gt $max_name_len ]; then
            name=${prefix:0:$max_name_len}
          else
            name=$prefix
          fi

          # Timestamped folder: prefix-YYMMDDHHMMSS (or just timestamp if prefix empty)
          ts=$(date -u +%y%m%d%H%M%S)
          if [ -n "$prefix" ]; then
            folder="$prefix-$ts"
          else
            folder="$ts"
          fi

          echo "Computed Torii name (prefix only): $name"
          echo "Computed Torii folder (with timestamp): $folder"
          echo "torii_name=$name" >> "$GITHUB_OUTPUT"
          echo "torii_folder=$folder" >> "$GITHUB_OUTPUT"

      - name: Render torii config from template
        id: render
        if: ${{ github.event.inputs.operation != 'update-tier' }}
        env:
          ENV_NAME: ${{ github.event.inputs.env }}
          RPC_URL: ${{ github.event.inputs.rpc_url }}
          WORLD_ADDRESS: ${{ github.event.inputs.torii_world_address }}
          WORLD_BLOCK: ${{ github.event.inputs.world_block }}
          NAMESPACES_RAW: ${{ github.event.inputs.torii_namespaces }}
          CONTRACTS_RAW: ${{ github.event.inputs.torii_external_contracts }}
          TORII_FOLDER: ${{ steps.name.outputs.torii_folder }}
        run: |
          set -euo pipefail
          template="contracts/game/torii-template.toml"
          if [ ! -f "$template" ]; then
            echo "❌ Missing template: $template"
            exit 1
          fi

          # Prepare deployment directory
          deploy_dir="contracts/game/factory-deployments/${ENV_NAME}/${TORII_FOLDER}"
          mkdir -p "$deploy_dir"
          out_file="$deploy_dir/torii.toml"

          # Render using Python for robust string munging
          python3 - << 'PY'
          import os, sys, re
          from pathlib import Path

          env_name = os.environ["ENV_NAME"]
          rpc = os.environ["RPC_URL"].strip()
          world = os.environ["WORLD_ADDRESS"].strip()
          world_block_raw = os.environ.get("WORLD_BLOCK", "0").strip() or "0"
          namespaces_raw = os.environ.get("NAMESPACES_RAW", "").strip()
          contracts_raw = os.environ.get("CONTRACTS_RAW", "").strip()

          template = Path("contracts/game/torii-template.toml")
          out_file = Path(f"contracts/game/factory-deployments/{env_name}/{os.environ['TORII_FOLDER']}/torii.toml")

          if not template.exists():
              print(f"Missing template: {template}", file=sys.stderr)
              sys.exit(1)

          text = template.read_text()

          # Validate and normalize world_block
          try:
              world_block = str(int(world_block_raw))
          except Exception:
              print(f"Invalid WORLD_BLOCK, expected integer got: {world_block_raw}", file=sys.stderr)
              sys.exit(1)

          # Namespaces to TOML list string
          namespaces = []
          if namespaces_raw:
              for part in namespaces_raw.split(','):
                  item = part.strip()
                  if item:
                      namespaces.append(item)
          namespaces_str = ", ".join(f'"{n}"' for n in namespaces) if namespaces else ''

          # Contracts: multiline, one per line; we will replace the full line containing {CONTRACTS}
          def parse_contracts(s: str):
              s = s.strip()
              if not s:
                  return []
              # Strip surrounding quotes if the whole payload is quoted
              if (s.startswith('"') and s.endswith('"')) or (s.startswith("'") and s.endswith("'")):
                  s = s[1:-1]
              # Turn literal \n into real newlines if present
              s = s.replace('\\n', '\n')
              items = []
              for part in re.split(r'[\r\n,]+', s):
                  tok = part.strip().strip('"').strip("'")
                  if tok:
                      items.append(tok)
              return items

          contracts_list = parse_contracts(contracts_raw)

          def replace_placeholder_line(full_text, placeholder, lines):
              out_lines = []
              for raw in full_text.splitlines(True):  # keep newlines
                  if placeholder in raw:
                      # capture original indentation (spaces/tabs before placeholder)
                      m = re.match(r"^([\t ]*)", raw)
                      indent = m.group(1) if m else ""
                      if lines:
                          out_lines.extend([f"{indent}\"{v}\",\n" for v in lines])
                      else:
                          # leave a clean blank line with same indentation
                          out_lines.append(indent + "\n")
                  else:
                      out_lines.append(raw)
              return "".join(out_lines)

          # Basic scalar replacements
          text = (text
              .replace("{RPC_URL}", rpc)
              .replace("{WORLD_ADDRESS}", world)
              .replace("{WORLD_BLOCK}", world_block)
              .replace("{NAMESPACE}", namespaces_str)
          )

          # Structured replacement for {CONTRACTS} preserving indentation and avoiding extra blank lines
          text = replace_placeholder_line(text, "{CONTRACTS}", contracts_list)

          out_file.write_text(text)
          print(f"Rendered: {out_file}")
          PY

          echo "config_path=$out_file" >> "$GITHUB_OUTPUT"
          echo "deploy_dir=$deploy_dir" >> "$GITHUB_OUTPUT"
          echo "----- Rendered torii.toml ($out_file) -----"
          cat "$out_file"
          echo "-------------------------------------------"

      - name: Resolve Torii slot state
        id: torii_state
        env:
          NAME:
            ${{ github.event.inputs.operation == 'update-tier' && github.event.inputs.torii_name ||
            steps.name.outputs.torii_name }}
        run: |
          set -euo pipefail

          describe_log="$(mktemp)"
          list_log="$(mktemp)"
          state="indeterminate"
          state_source="unresolved"
          current_tier=""
          describe_error=""

          has_torii_project() {
            awk -v project="$NAME" '
              /^Project: / {
                current_project = $2
                next
              }
              /^Service: / {
                if (current_project == project && $2 == "torii") {
                  found = 1
                }
              }
              END {
                exit(found ? 0 : 1)
              }
            ' "$1"
          }

          capture_single_line() {
            tr '\n' ' ' <"$1" | sed 's/[[:space:]]\+/ /g; s/^ //; s/ $//'
          }

          if slot d describe "$NAME" torii >"$describe_log" 2>&1; then
            state="existing"
            state_source="describe"
            current_tier="$(sed -n 's/^Tier: //p' "$describe_log" | head -n1 | tr '[:upper:]' '[:lower:]')"
            echo "Resolved Torii state for $NAME via describe"
            cat "$describe_log"
          else
            describe_error="$(capture_single_line "$describe_log")"

            if grep -Eiq 'not found|code = NotFound|deployment .* not found' "$describe_log"; then
              state="missing"
              state_source="describe-not-found"
              echo "Resolved Torii state for $NAME as missing via describe"
              cat "$describe_log"
            elif slot d list >"$list_log" 2>&1; then
              if has_torii_project "$list_log"; then
                state="existing"
                state_source="list"
                echo "Describe failed for $NAME, but slot d list confirmed the Torii deployment exists"
                echo "$describe_error"
              else
                state="missing"
                state_source="list"
                echo "Describe failed for $NAME, and slot d list did not find the Torii deployment"
                echo "$describe_error"
              fi
            else
              state="indeterminate"
              state_source="describe-and-list-failed"
              echo "Unable to verify Torii state for $NAME"
              echo "Describe error: $describe_error"
              echo "List error: $(capture_single_line "$list_log")"
            fi
          fi

          {
            echo "state=$state"
            echo "state_source=$state_source"
            echo "current_tier=$current_tier"
            echo "describe_error<<EOF"
            echo "$describe_error"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Ensure Torii slot instance exists
        if: ${{ github.event.inputs.operation != 'update-tier' }}
        env:
          TEAM: ${{ github.event.inputs.slot_team }}
          TIER: ${{ github.event.inputs.torii_tier }}
          VERSION: ${{ github.event.inputs.torii_version }}
          NAME: ${{ steps.name.outputs.torii_name }}
          CONFIG: ${{ steps.render.outputs.config_path }}
          REPLICAS: ${{ github.event.inputs.torii_replicas }}
          TORII_STATE: ${{ steps.torii_state.outputs.state }}
          TORII_STATE_SOURCE: ${{ steps.torii_state.outputs.state_source }}
        run: |
          set -euo pipefail
          echo "Ensuring Torii slot is live: $NAME"
          echo "Team: $TEAM | Tier: $TIER | Version: $VERSION"
          echo "Config: $CONFIG"

          if [ "$TORII_STATE" = "existing" ]; then
            echo "Torii slot already exists. Nothing to create."
            echo "Resolution source: $TORII_STATE_SOURCE"
            exit 0
          fi

          if [ "$TORII_STATE" = "indeterminate" ]; then
            echo "❌ Unable to verify whether Torii slot already exists for $NAME"
            echo "Refusing to create a duplicate deployment while state is indeterminate"
            exit 1
          fi

          echo "Torii slot does not exist yet. Creating it now."
          slot d create -f \
            --team "$TEAM" \
            --tier "$TIER" \
            "$NAME" torii \
            --version "$VERSION" \
            --config "$CONFIG"

      - name: Update Torii slot tier
        if: ${{ github.event.inputs.operation == 'update-tier' }}
        env:
          NAME: ${{ github.event.inputs.torii_name }}
          TIER: ${{ github.event.inputs.torii_tier }}
          CURRENT_TIER: ${{ steps.torii_state.outputs.current_tier }}
          TORII_STATE: ${{ steps.torii_state.outputs.state }}
          TORII_STATE_SOURCE: ${{ steps.torii_state.outputs.state_source }}
        run: |
          set -euo pipefail

          if [ "$TORII_STATE" = "missing" ]; then
            echo "❌ Torii slot does not exist: $NAME"
            exit 1
          fi

          if [ "$TORII_STATE" = "indeterminate" ]; then
            echo "❌ Unable to verify the Torii deployment state for $NAME"
            echo "Refusing to update a deployment whose state could not be resolved"
            exit 1
          fi

          if [ -n "$CURRENT_TIER" ] && [ "$CURRENT_TIER" = "$TIER" ]; then
            echo "Torii slot is already at the requested tier: $NAME ($CURRENT_TIER)"
            exit 0
          fi

          if [ -n "$CURRENT_TIER" ]; then
            echo "Updating Torii slot tier: $NAME ($CURRENT_TIER -> $TIER)"
          else
            echo "Updating Torii slot tier: $NAME (current tier unavailable, resolved via $TORII_STATE_SOURCE)"
          fi

          slot d update --tier "$TIER" "$NAME" torii

      - name: Describe Torii slot after action
        id: torii_post_state
        if: ${{ success() }}
        env:
          NAME:
            ${{ github.event.inputs.operation == 'update-tier' && github.event.inputs.torii_name ||
            steps.name.outputs.torii_name }}
        run: |
          set -euo pipefail

          describe_log="$(mktemp)"
          final_tier=""
          final_url=""
          final_version=""
          final_branch=""
          post_state="unavailable"
          post_error=""

          if slot d describe "$NAME" torii >"$describe_log" 2>&1; then
            post_state="available"
            final_tier="$(sed -n 's/^Tier: //p' "$describe_log" | head -n1 | tr '[:upper:]' '[:lower:]')"
            final_url="$(sed -n 's/^Url: //p' "$describe_log" | head -n1)"
            final_version="$(sed -n 's/^Version: //p' "$describe_log" | head -n1)"
            final_branch="$(sed -n 's/^Branch: //p' "$describe_log" | head -n1)"
            echo "Final Torii state for $NAME"
            cat "$describe_log"
          else
            post_error="$(tr '\n' ' ' <"$describe_log" | sed 's/[[:space:]]\+/ /g; s/^ //; s/ $//')"
            echo "Final Torii describe is unavailable for $NAME"
            echo "$post_error"
          fi

          {
            echo "post_state=$post_state"
            echo "final_tier=$final_tier"
            echo "final_url=$final_url"
            echo "final_version=$final_version"
            echo "final_branch=$final_branch"
            echo "post_error<<EOF"
            echo "$post_error"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # - name: Commit and push torii config
      #   if: success()
      #   env:
      #     DEPLOY_DIR: ${{ steps.render.outputs.deploy_dir }}
      #     NAME: ${{ steps.name.outputs.torii_name }}
      #     ENV_NAME: ${{ github.event.inputs.env }}
      #   run: |
      #     set -euo pipefail
      #     git config user.name "github-actions[bot]"
      #     git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      #     git add "$DEPLOY_DIR/torii.toml"
      #     if git diff --staged --quiet; then
      #       echo "No changes to commit"
      #     else
      #       git commit -m "chore: save torii '${NAME}' config for ${ENV_NAME}"
      #       git push
      #     fi

      - name: Summary
        if: always()
        env:
          NAME:
            ${{ github.event.inputs.operation == 'update-tier' && github.event.inputs.torii_name ||
            steps.name.outputs.torii_name }}
          ENV_NAME: ${{ github.event.inputs.env }}
          CONFIG: ${{ steps.render.outputs.config_path }}
          VERSION: ${{ github.event.inputs.torii_version }}
          OPERATION: ${{ github.event.inputs.operation }}
          TIER: ${{ github.event.inputs.torii_tier }}
          RESOLVED_STATE: ${{ steps.torii_state.outputs.state }}
          RESOLVED_STATE_SOURCE: ${{ steps.torii_state.outputs.state_source }}
          RESOLVED_CURRENT_TIER: ${{ steps.torii_state.outputs.current_tier }}
          RESOLVED_ERROR: ${{ steps.torii_state.outputs.describe_error }}
          FINAL_STATE: ${{ steps.torii_post_state.outputs.post_state }}
          FINAL_TIER: ${{ steps.torii_post_state.outputs.final_tier }}
          FINAL_URL: ${{ steps.torii_post_state.outputs.final_url }}
          FINAL_VERSION: ${{ steps.torii_post_state.outputs.final_version }}
          FINAL_BRANCH: ${{ steps.torii_post_state.outputs.final_branch }}
          FINAL_ERROR: ${{ steps.torii_post_state.outputs.post_error }}
        run: |
          {
            echo "## Torii Deployment";
            echo "- Operation: \`$OPERATION\`";
            echo "- Name: \`$NAME\`";
            echo "- Env: \`$ENV_NAME\`";
            echo "- Tier: \`$TIER\`";
            echo "- Resolved state: \`$RESOLVED_STATE\`";
            echo "- Resolution source: \`$RESOLVED_STATE_SOURCE\`";
            if [ -n "$RESOLVED_CURRENT_TIER" ]; then
              echo "- Live tier before action: \`$RESOLVED_CURRENT_TIER\`";
            fi
            if [ -n "$RESOLVED_ERROR" ]; then
              echo "- Describe fallback reason: \`$RESOLVED_ERROR\`";
            fi
            if [ "$OPERATION" != "update-tier" ]; then
              echo "- Version: \`$VERSION\`";
              echo "- Config saved: \`$CONFIG\`";
            fi
            echo "- Final describe: \`$FINAL_STATE\`";
            if [ "$FINAL_STATE" = "available" ]; then
              if [ -n "$FINAL_TIER" ]; then
                echo "- Live tier after action: \`$FINAL_TIER\`";
              fi
              if [ -n "$FINAL_VERSION" ]; then
                echo "- Live version: \`$FINAL_VERSION\`";
              fi
              if [ -n "$FINAL_BRANCH" ]; then
                echo "- Live branch: \`$FINAL_BRANCH\`";
              fi
              if [ -n "$FINAL_URL" ]; then
                echo "- Live URL: \`$FINAL_URL\`";
              fi
            elif [ -n "$FINAL_ERROR" ]; then
              echo "- Final describe error: \`$FINAL_ERROR\`";
            fi
            echo "- Deployed at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')";
          } >> "$GITHUB_STEP_SUMMARY"
