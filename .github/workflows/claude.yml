name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup GitHub MCP Server
        run: |
          mkdir -p /tmp/mcp-config
          cat > /tmp/mcp-config/mcp-servers.json << 'EOF'
          {
            "mcpServers": {
              "github": {
                "command": "docker",
                "args": [
                  "run",
                  "-i",
                  "--rm",
                  "-e",
                  "GITHUB_PERSONAL_ACCESS_TOKEN",
                  "ghcr.io/github/github-mcp-server:latest"
                ],
                "env": {
                  "GITHUB_PERSONAL_ACCESS_TOKEN": "${{ secrets.GH_PAT }}"
                }
              }
            }
          }
          EOF

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: "claude-sonnet-4-6"
          timeout_minutes: "10"
          mcp_config: /tmp/mcp-config/mcp-servers.json

          allowed_tools:
            "Bash(pnpm run format),Bash(pnpm run lint),Bash(pnpm run knip),Bash(pnpm run build:packages),Bash(pnpm
            test),mcp__github__get_issue,mcp__github__get_issue_comments,mcp__github__update_issue,mcp__github__search_issues,mcp__github__list_issues,mcp__github__create_issue,mcp__github__get_pull_request,mcp__github__list_pull_requests,mcp__github__create_pull_request,mcp__github__update_pull_request,mcp__github__get_file_contents,mcp__github__update_file,mcp__github__create_branch,mcp__github__list_branches,mcp__github__get_repository,mcp__github__list_repositories,mcp__github__search_repositories,mcp__github__get_user,mcp__github__list_commits,mcp__github__create_comment,mcp__github__list_comments,mcp__github__update_comment,mcp__github__delete_comment"

          custom_instructions: |
            # Eternum Project Assistant

            You are an AI assistant for Eternum, a blockchain strategy game (Cairo/Dojo on Starknet).

            ## Key Context
            - Players manage realms, resources, armies, and trade using $LORDS tokens on a hex map
            - Tech: Cairo + Dojo (contracts), React + TypeScript + Vite + Three.js (frontend), Torii (indexing), pnpm monorepo
            - Packages: @bibliothecadao/core, provider, react, torii, types, dojo
            - Environments: Local (Katana), Sepolia, Mainnet, Slot (staging)

            ## Git Workflow (MANDATORY)
            - Always branch from `next` (never work directly on `next`)
            - Branch naming: feature/, fix/, refactor/, docs/, chore/
            - Always target `next` for PRs, NEVER `main`
            - Use MCP tools for branch creation with base "next"

            ## Quality Checks
            ```bash
            pnpm run format && pnpm run lint && pnpm run knip
            pnpm test
            pnpm run build:packages  # after package changes
            ```

            ## Code Standards
            - TypeScript: strict typing, no `any`, functional React components
            - Cairo: Dojo patterns, comprehensive tests, economic security focus
            - Performance: optimize for real-time gaming
            - Always check for breaking cross-package changes
