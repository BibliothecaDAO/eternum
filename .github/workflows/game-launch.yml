name: Game Launch

on:
  workflow_dispatch:
    inputs:
      launch_kind:
        description: "Launch a single game, a series, or a rotation"
        required: false
        default: game
        type: choice
        options:
          - game
          - series
          - rotation
      environment:
        description: "Deployment environment"
        required: true
        type: choice
        options:
          - mainnet.blitz
          - mainnet.eternum
          - slot.blitz
          - slot.eternum
      game_name:
        description: "Game/world name"
        required: false
      game_start_time:
        description: "Game start time (unix seconds, unix milliseconds, or ISO-8601)"
        required: false
      series_name:
        description: "Series name (required when launch_kind=series)"
        required: false
        type: string
      series_games_json:
        description: "JSON array of series games (required when launch_kind=series)"
        required: false
        type: string
      rotation_name:
        description: "Rotation name (required when launch_kind=rotation)"
        required: false
        type: string
      first_game_start_time:
        description: "First game start time for a rotation (required when launch_kind=rotation)"
        required: false
        type: string
      game_interval_minutes:
        description: "Minutes between rotation games"
        required: false
        type: string
      max_games:
        description: "Maximum number of rotation games to create"
        required: false
        type: string
      advance_window_games:
        description: "How many future rotation games to keep ready (max 5)"
        required: false
        type: string
      evaluation_interval_minutes:
        description: "How often a rotation becomes due for evaluation"
        required: false
        type: string
      dev_mode_on:
        description: 'Optional override for dev mode ("true" or "false"). Leave blank to use the environment config.'
        required: false
        default: ""
        type: choice
        options:
          - ""
          - "true"
          - "false"
      single_realm_mode:
        description:
          'Optional override for single realm mode ("true" or "false"). Leave blank to use the environment config.'
        required: false
        default: ""
        type: choice
        options:
          - ""
          - "true"
          - "false"
      two_player_mode:
        description:
          'Optional override for two player mode ("true" or "false"). Leave blank to use the environment config.'
        required: false
        default: ""
        type: choice
        options:
          - ""
          - "true"
          - "false"
      duration_seconds:
        description:
          "Optional override for duration in seconds. Leave blank to use the environment config. Used by blitz season
          end_at."
        required: false
        type: string
      map_config_overrides_json:
        description: "Optional JSON object with raw map config overrides."
        required: false
        type: string
      blitz_registration_overrides_json:
        description: "Optional JSON object with raw Blitz registration overrides."
        required: false
        type: string
      auto_retry_enabled:
        description: "Enable scheduled auto-retry for multi-game launches"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      auto_retry_interval_minutes:
        description: "Multi-game auto-retry interval in minutes"
        required: false
        type: string
      target_game_names_json:
        description: "Optional JSON array of child game names to target during grouped indexer recovery"
        required: false
        type: string
      launch_step:
        description: "Launch scope. Use full for a fresh run, or resume from a step and continue forward from there."
        required: false
        default: full
        type: choice
        options:
          - full
          - create-world
          - wait-for-factory-index
          - configure-world
          - grant-lootchest-role
          - grant-village-pass-role
          - create-banks
          - create-indexer
          - sync-paymaster
          - create-series
          - create-worlds
          - wait-for-factory-indexes
          - configure-worlds
          - grant-lootchest-roles
          - grant-village-pass-roles
          - create-indexers

jobs:
  launch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ github.event.inputs.environment }}
    permissions:
      actions: write
      contents: write
    env:
      GAME_LAUNCH_KIND: ${{ github.event.inputs.launch_kind }}
      GAME_LAUNCH_ENVIRONMENT: ${{ github.event.inputs.environment }}
      GAME_LAUNCH_GAME_NAME: ${{ github.event.inputs.game_name }}
      GAME_LAUNCH_START_TIME: ${{ github.event.inputs.game_start_time }}
      GAME_LAUNCH_SERIES_NAME: ${{ github.event.inputs.series_name }}
      GAME_LAUNCH_SERIES_GAMES_JSON: ${{ github.event.inputs.series_games_json }}
      GAME_LAUNCH_ROTATION_NAME: ${{ github.event.inputs.rotation_name }}
      GAME_LAUNCH_FIRST_GAME_START_TIME: ${{ github.event.inputs.first_game_start_time }}
      GAME_LAUNCH_GAME_INTERVAL_MINUTES: ${{ github.event.inputs.game_interval_minutes }}
      GAME_LAUNCH_MAX_GAMES: ${{ github.event.inputs.max_games }}
      GAME_LAUNCH_ADVANCE_WINDOW_GAMES: ${{ github.event.inputs.advance_window_games }}
      GAME_LAUNCH_EVALUATION_INTERVAL_MINUTES: ${{ github.event.inputs.evaluation_interval_minutes }}
      GAME_LAUNCH_DEV_MODE_ON: ${{ github.event.inputs.dev_mode_on }}
      GAME_LAUNCH_SINGLE_REALM_MODE: ${{ github.event.inputs.single_realm_mode }}
      GAME_LAUNCH_TWO_PLAYER_MODE: ${{ github.event.inputs.two_player_mode }}
      GAME_LAUNCH_DURATION_SECONDS: ${{ github.event.inputs.duration_seconds }}
      GAME_LAUNCH_MAP_CONFIG_OVERRIDES_JSON: ${{ github.event.inputs.map_config_overrides_json }}
      GAME_LAUNCH_BLITZ_REGISTRATION_OVERRIDES_JSON: ${{ github.event.inputs.blitz_registration_overrides_json }}
      GAME_LAUNCH_AUTO_RETRY_ENABLED: ${{ github.event.inputs.auto_retry_enabled }}
      GAME_LAUNCH_AUTO_RETRY_INTERVAL_MINUTES: ${{ github.event.inputs.auto_retry_interval_minutes }}
      GAME_LAUNCH_TARGET_GAME_NAMES_JSON: ${{ github.event.inputs.target_game_names_json }}
      GAME_LAUNCH_STEP: ${{ github.event.inputs.launch_step }}
      FACTORY_RUN_STORE_BRANCH: factory-runs
      FACTORY_ADDRESS: ${{ vars.FACTORY_ADDRESS }}
      DOJO_ACCOUNT_ADDRESS: ${{ vars.GAME_LAUNCH_DOJO_ACCOUNT_ADDRESS }}
      DOJO_PRIVATE_KEY: ${{ secrets.GAME_LAUNCH_DOJO_PRIVATE_KEY }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile --ignore-scripts

      - name: Build required packages
        run: |
          set -euo pipefail
          pnpm --dir packages/types build
          pnpm --dir packages/provider build

      - name: Install Slot CLI
        if:
          ${{ startsWith(github.event.inputs.environment, 'mainnet.') && (github.event.inputs.launch_step == 'full' ||
          github.event.inputs.launch_step == 'sync-paymaster') }}
        run: |
          set -euo pipefail
          curl -L https://slot.cartridge.sh | bash
          /home/runner/.config/.slot/bin/slotup
          echo "/home/runner/.config/.slot/bin" >> $GITHUB_PATH
          slot --version || true

      - name: Prepare launch arguments
        run: |
          set -euo pipefail

          GAME_LAUNCH_NETWORK="${GAME_LAUNCH_ENVIRONMENT%%.*}"
          GAME_LAUNCH_GAME_TYPE="${GAME_LAUNCH_ENVIRONMENT##*.}"

          if [ -z "${GAME_LAUNCH_NETWORK}" ] || [ -z "${GAME_LAUNCH_GAME_TYPE}" ]; then
            echo "Unable to resolve config sync target from ${GAME_LAUNCH_ENVIRONMENT}" >&2
            exit 1
          fi

          if [ "${GAME_LAUNCH_STEP}" = "sync-paymaster" ] && [ "${GAME_LAUNCH_NETWORK}" != "mainnet" ]; then
            echo "sync-paymaster is only supported for mainnet environments" >&2
            exit 1
          fi

          if [ "${GAME_LAUNCH_STEP}" != "sync-paymaster" ] && { [ -z "${DOJO_ACCOUNT_ADDRESS}" ] || [ -z "${DOJO_PRIVATE_KEY}" ]; }; then
            echo "Missing DOJO credentials for ${GAME_LAUNCH_ENVIRONMENT}" >&2
            exit 1
          fi

          mkdir -p .context/game-launch

          cat > .context/game-launch/launch-env.sh <<'EOF'
          args=(
            --launch-kind "${GAME_LAUNCH_KIND}"
            --environment "${GAME_LAUNCH_ENVIRONMENT}"
            --mode batched
          )

          GAME_LAUNCH_NETWORK="${GAME_LAUNCH_ENVIRONMENT%%.*}"
          GAME_LAUNCH_GAME_TYPE="${GAME_LAUNCH_ENVIRONMENT##*.}"

          if [ -z "${GAME_LAUNCH_NETWORK}" ] || [ -z "${GAME_LAUNCH_GAME_TYPE}" ]; then
            echo "Unable to resolve config sync target from ${GAME_LAUNCH_ENVIRONMENT}" >&2
            exit 1
          fi

          if [ "${GAME_LAUNCH_KIND}" = "series" ]; then
            if [ -z "${GAME_LAUNCH_SERIES_NAME}" ] || [ -z "${GAME_LAUNCH_SERIES_GAMES_JSON}" ]; then
              echo "Series launches require series_name and series_games_json" >&2
              exit 1
            fi

            args+=(
              --series-name "${GAME_LAUNCH_SERIES_NAME}"
              --series-games-json "${GAME_LAUNCH_SERIES_GAMES_JSON}"
            )
          elif [ "${GAME_LAUNCH_KIND}" = "rotation" ]; then
            if [ -z "${GAME_LAUNCH_ROTATION_NAME}" ] || [ -z "${GAME_LAUNCH_FIRST_GAME_START_TIME}" ] || [ -z "${GAME_LAUNCH_GAME_INTERVAL_MINUTES}" ] || [ -z "${GAME_LAUNCH_MAX_GAMES}" ] || [ -z "${GAME_LAUNCH_EVALUATION_INTERVAL_MINUTES}" ]; then
              echo "Rotation launches require rotation_name, first_game_start_time, game_interval_minutes, max_games, and evaluation_interval_minutes" >&2
              exit 1
            fi

            args+=(
              --rotation-name "${GAME_LAUNCH_ROTATION_NAME}"
              --first-game-start-time "${GAME_LAUNCH_FIRST_GAME_START_TIME}"
              --game-interval-minutes "${GAME_LAUNCH_GAME_INTERVAL_MINUTES}"
              --max-games "${GAME_LAUNCH_MAX_GAMES}"
              --evaluation-interval-minutes "${GAME_LAUNCH_EVALUATION_INTERVAL_MINUTES}"
            )

            if [ -n "${GAME_LAUNCH_ADVANCE_WINDOW_GAMES}" ]; then
              args+=(--advance-window-games "${GAME_LAUNCH_ADVANCE_WINDOW_GAMES}")
            fi
          else
            if [ -z "${GAME_LAUNCH_GAME_NAME}" ] || [ -z "${GAME_LAUNCH_START_TIME}" ]; then
              echo "Game launches require game_name and game_start_time" >&2
              exit 1
            fi

            args+=(
              --game "${GAME_LAUNCH_GAME_NAME}"
              --start-time "${GAME_LAUNCH_START_TIME}"
            )
          fi

          if [ -n "${FACTORY_ADDRESS}" ]; then
            args+=(--factory-address "${FACTORY_ADDRESS}")
          fi

          if [ -n "${GAME_LAUNCH_DEV_MODE_ON}" ]; then
            args+=(--dev-mode-on "${GAME_LAUNCH_DEV_MODE_ON}")
          fi

          if [ -n "${GAME_LAUNCH_SINGLE_REALM_MODE}" ]; then
            args+=(--single-realm-mode "${GAME_LAUNCH_SINGLE_REALM_MODE}")
          fi

          if [ -n "${GAME_LAUNCH_TWO_PLAYER_MODE}" ]; then
            args+=(--two-player-mode "${GAME_LAUNCH_TWO_PLAYER_MODE}")
          fi

          if [ -n "${GAME_LAUNCH_DURATION_SECONDS}" ]; then
            args+=(--duration-seconds "${GAME_LAUNCH_DURATION_SECONDS}")
          fi

          if [ -n "${GAME_LAUNCH_MAP_CONFIG_OVERRIDES_JSON}" ]; then
            args+=(--map-config-overrides-json "${GAME_LAUNCH_MAP_CONFIG_OVERRIDES_JSON}")
          fi

          if [ -n "${GAME_LAUNCH_BLITZ_REGISTRATION_OVERRIDES_JSON}" ]; then
            args+=(--blitz-registration-overrides-json "${GAME_LAUNCH_BLITZ_REGISTRATION_OVERRIDES_JSON}")
          fi

          if [ "${GAME_LAUNCH_KIND}" = "series" ] || [ "${GAME_LAUNCH_KIND}" = "rotation" ]; then
            if [ -n "${GAME_LAUNCH_AUTO_RETRY_ENABLED}" ]; then
              args+=(--auto-retry-enabled "${GAME_LAUNCH_AUTO_RETRY_ENABLED}")
            fi

            if [ -n "${GAME_LAUNCH_AUTO_RETRY_INTERVAL_MINUTES}" ]; then
              args+=(--auto-retry-interval-minutes "${GAME_LAUNCH_AUTO_RETRY_INTERVAL_MINUTES}")
            fi

            if [ -n "${GAME_LAUNCH_TARGET_GAME_NAMES_JSON}" ]; then
              args+=(--target-game-names-json "${GAME_LAUNCH_TARGET_GAME_NAMES_JSON}")
            fi
          fi

          if [ "${GAME_LAUNCH_KIND}" = "series" ]; then
            run_store_args=(
              --launch-kind series
              --environment "${GAME_LAUNCH_ENVIRONMENT}"
              --series-name "${GAME_LAUNCH_SERIES_NAME}"
              --series-games-json "${GAME_LAUNCH_SERIES_GAMES_JSON}"
              --launch-step "${GAME_LAUNCH_STEP}"
            )
          elif [ "${GAME_LAUNCH_KIND}" = "rotation" ]; then
            run_store_args=(
              --launch-kind rotation
              --environment "${GAME_LAUNCH_ENVIRONMENT}"
              --rotation-name "${GAME_LAUNCH_ROTATION_NAME}"
              --first-game-start-time "${GAME_LAUNCH_FIRST_GAME_START_TIME}"
              --game-interval-minutes "${GAME_LAUNCH_GAME_INTERVAL_MINUTES}"
              --max-games "${GAME_LAUNCH_MAX_GAMES}"
              --evaluation-interval-minutes "${GAME_LAUNCH_EVALUATION_INTERVAL_MINUTES}"
              --launch-step "${GAME_LAUNCH_STEP}"
            )

            if [ -n "${GAME_LAUNCH_ADVANCE_WINDOW_GAMES}" ]; then
              run_store_args+=(--advance-window-games "${GAME_LAUNCH_ADVANCE_WINDOW_GAMES}")
            fi
          else
            run_store_args=(
              --launch-kind game
              --environment "${GAME_LAUNCH_ENVIRONMENT}"
              --game "${GAME_LAUNCH_GAME_NAME}"
              --start-time "${GAME_LAUNCH_START_TIME}"
              --launch-step "${GAME_LAUNCH_STEP}"
            )
          fi

          if [ -n "${GAME_LAUNCH_MAP_CONFIG_OVERRIDES_JSON}" ]; then
            run_store_args+=(--map-config-overrides-json "${GAME_LAUNCH_MAP_CONFIG_OVERRIDES_JSON}")
          fi

          if [ -n "${GAME_LAUNCH_BLITZ_REGISTRATION_OVERRIDES_JSON}" ]; then
            run_store_args+=(--blitz-registration-overrides-json "${GAME_LAUNCH_BLITZ_REGISTRATION_OVERRIDES_JSON}")
          fi

          if [ "${GAME_LAUNCH_KIND}" = "series" ] || [ "${GAME_LAUNCH_KIND}" = "rotation" ]; then
            if [ -n "${GAME_LAUNCH_AUTO_RETRY_ENABLED}" ]; then
              run_store_args+=(--auto-retry-enabled "${GAME_LAUNCH_AUTO_RETRY_ENABLED}")
            fi

            if [ -n "${GAME_LAUNCH_AUTO_RETRY_INTERVAL_MINUTES}" ]; then
              run_store_args+=(--auto-retry-interval-minutes "${GAME_LAUNCH_AUTO_RETRY_INTERVAL_MINUTES}")
            fi

            if [ -n "${GAME_LAUNCH_TARGET_GAME_NAMES_JSON}" ]; then
              run_store_args+=(--target-game-names-json "${GAME_LAUNCH_TARGET_GAME_NAMES_JSON}")
            fi
          fi

          if [ -n "${FACTORY_RUN_STORE_BRANCH}" ]; then
            run_store_args+=(--branch "${FACTORY_RUN_STORE_BRANCH}")
          fi

          resolve_account_lease_owner_name() {
            if [ "${GAME_LAUNCH_KIND}" = "series" ]; then
              printf '%s' "${GAME_LAUNCH_SERIES_NAME}"
              return 0
            fi

            if [ "${GAME_LAUNCH_KIND}" = "rotation" ]; then
              printf '%s' "${GAME_LAUNCH_ROTATION_NAME}"
              return 0
            fi

            printf '%s' "${GAME_LAUNCH_GAME_NAME}"
          }

          account_lease_args=(
            --environment "${GAME_LAUNCH_ENVIRONMENT}"
            --game "$(resolve_account_lease_owner_name)"
            --account-address "${DOJO_ACCOUNT_ADDRESS}"
          )

          if [ -n "${FACTORY_RUN_STORE_BRANCH}" ]; then
            account_lease_args+=(--branch "${FACTORY_RUN_STORE_BRANCH}")
          fi

          sync_current_config() {
            pnpm run "config:sync:${GAME_LAUNCH_NETWORK}:${GAME_LAUNCH_GAME_TYPE}" >/dev/null
          }

          run_launch_step_command() {
            local step_id="$1"
            local step_log=".context/game-launch/${step_id}.log"
            local exit_code=0

            sync_current_config

            set +e
            bun config/deployer/clean/cli/launch-step.ts --step "${step_id}" "${args[@]}" 2>&1 | tee "${step_log}"
            exit_code=${PIPESTATUS[0]}
            set -e

            return "${exit_code}"
          }

          record_launch_step_started() {
            local step_id="$1"

            sync_current_config

            bun config/deployer/clean/cli/launch-run-store.ts \
              --event step-started \
              --step "${step_id}" \
              "${run_store_args[@]}"
          }

          record_launch_step_succeeded() {
            local step_id="$1"

            sync_current_config

            bun config/deployer/clean/cli/launch-run-store.ts \
              --event step-succeeded \
              --step "${step_id}" \
              "${run_store_args[@]}"
          }

          record_launch_step_failed() {
            local step_id="$1"
            local step_log=".context/game-launch/${step_id}.log"

            sync_current_config

            bun config/deployer/clean/cli/launch-run-store.ts \
              --event step-failed \
              --step "${step_id}" \
              --error-message-file "${step_log}" \
              "${run_store_args[@]}"
          }

          step_log_contains_client_timeout() {
            local step_id="$1"
            local step_log=".context/game-launch/${step_id}.log"

            grep -q "Client.Timeout exceeded" "${step_log}"
          }

          step_requires_account_lease() {
            local step_id="$1"
            local lease_step_id=""

            lease_step_id="$(resolve_account_lease_step_id "${step_id}" || true)"
            [ -n "${lease_step_id}" ]
          }

          resolve_account_lease_step_id() {
            local step_id="$1"

            case "${step_id}" in
              create-world|create-worlds)
                printf 'create-world'
                ;;
              configure-world|configure-worlds)
                printf 'configure-world'
                ;;
              grant-lootchest-role|grant-lootchest-roles)
                printf 'grant-lootchest-role'
                ;;
              grant-village-pass-role|grant-village-pass-roles)
                printf 'grant-village-pass-role'
                ;;
              create-banks)
                printf 'create-banks'
                ;;
              *)
                return 1
                ;;
            esac
          }

          acquire_account_lease_if_needed() {
            local step_id="$1"
            local lease_step_id=""
            local lease_output=""
            local exit_code=0
            local did_wait="false"

            if ! lease_step_id="$(resolve_account_lease_step_id "${step_id}")"; then
              return 0
            fi

            while true; do
              sync_current_config

              set +e
              lease_output=$(
                bun config/deployer/clean/cli/launch-account-lease.ts \
                  --event acquire \
                  --step "${lease_step_id}" \
                  "${account_lease_args[@]}" 2>&1
              )
              exit_code=$?
              set -e

              if [ "${exit_code}" -eq 0 ]; then
                FACTORY_ACCOUNT_LEASE_ID="$(printf '%s\n' "${lease_output}" | tail -n 1 | tr -d '\r')"
                export FACTORY_ACCOUNT_LEASE_ID

                if [ "${did_wait}" = "true" ]; then
                  echo "Deployment account lease acquired for ${step_id}."
                fi

                return 0
              fi

              if [ "${exit_code}" -ne 2 ]; then
                printf '%s\n' "${lease_output}" > ".context/game-launch/${step_id}.log"
                printf '%s\n' "${lease_output}" >&2
                return "${exit_code}"
              fi

              if [ "${did_wait}" = "false" ]; then
                printf '%s\n' "${lease_output}"
                echo "Waiting for the deployment account before ${step_id}..."
                did_wait="true"
              fi

              sleep 10
            done
          }

          start_account_lease_heartbeat() {
            local step_id="$1"
            local lease_step_id=""
            local heartbeat_seconds="${FACTORY_ACCOUNT_LEASE_HEARTBEAT_SECONDS:-30}"

            if [ -z "${FACTORY_ACCOUNT_LEASE_ID:-}" ] || ! lease_step_id="$(resolve_account_lease_step_id "${step_id}")"; then
              return 0
            fi

            (
              while true; do
                sleep "${heartbeat_seconds}"
                sync_current_config
                bun config/deployer/clean/cli/launch-account-lease.ts \
                  --event heartbeat \
                  --step "${lease_step_id}" \
                  --lease-id "${FACTORY_ACCOUNT_LEASE_ID}" \
                  "${account_lease_args[@]}" >/dev/null 2>&1 || true
              done
            ) &

            FACTORY_ACCOUNT_LEASE_HEARTBEAT_PID=$!
            export FACTORY_ACCOUNT_LEASE_HEARTBEAT_PID
          }

          stop_account_lease_heartbeat() {
            if [ -z "${FACTORY_ACCOUNT_LEASE_HEARTBEAT_PID:-}" ]; then
              return 0
            fi

            kill "${FACTORY_ACCOUNT_LEASE_HEARTBEAT_PID}" >/dev/null 2>&1 || true
            wait "${FACTORY_ACCOUNT_LEASE_HEARTBEAT_PID}" >/dev/null 2>&1 || true
            unset FACTORY_ACCOUNT_LEASE_HEARTBEAT_PID
          }

          release_account_lease_if_needed() {
            local step_id="$1"
            local lease_step_id=""

            if [ -z "${FACTORY_ACCOUNT_LEASE_ID:-}" ] || ! lease_step_id="$(resolve_account_lease_step_id "${step_id}")"; then
              return 0
            fi

            sync_current_config

            bun config/deployer/clean/cli/launch-account-lease.ts \
              --event release \
              --step "${lease_step_id}" \
              --lease-id "${FACTORY_ACCOUNT_LEASE_ID}" \
              "${account_lease_args[@]}" >/dev/null 2>&1 || true

            unset FACTORY_ACCOUNT_LEASE_ID
          }

          prepare_account_lease_for_step() {
            local step_id="$1"

            if ! acquire_account_lease_if_needed "${step_id}"; then
              return 1
            fi

            start_account_lease_heartbeat "${step_id}"
          }

          finish_account_lease_for_step() {
            local step_id="$1"

            stop_account_lease_heartbeat
            release_account_lease_if_needed "${step_id}"
          }

          run_launch_step() {
            local step_id="$1"
            local exit_code=0

            record_launch_step_started "${step_id}"

            if ! prepare_account_lease_for_step "${step_id}"; then
              record_launch_step_failed "${step_id}"
              return 1
            fi

            if run_launch_step_command "${step_id}"; then
              exit_code=0
            else
              exit_code=$?
            fi

            finish_account_lease_for_step "${step_id}"

            if [ "${exit_code}" -eq 0 ]; then
              record_launch_step_succeeded "${step_id}"
              return 0
            fi

            record_launch_step_failed "${step_id}"
            return "${exit_code}"
          }

          run_create_world_step_with_timeout_retry() {
            local step_id="${1:-create-world}"
            local max_attempts=5
            local attempt=1
            local exit_code=1

            record_launch_step_started "${step_id}"

            if ! prepare_account_lease_for_step "${step_id}"; then
              record_launch_step_failed "${step_id}"
              return 1
            fi

            while true; do
              if run_launch_step_command "${step_id}"; then
                exit_code=0
                break
              fi

              if [ "${attempt}" -ge "${max_attempts}" ] || ! step_log_contains_client_timeout "${step_id}"; then
                exit_code=1
                break
              fi

              echo "Create world timed out with Client.Timeout exceeded. Retrying (${attempt}/${max_attempts})..."
              attempt=$((attempt + 1))
            done

            finish_account_lease_for_step "${step_id}"

            if [ "${exit_code}" -eq 0 ]; then
              record_launch_step_succeeded "${step_id}"
              return 0
            fi

            record_launch_step_failed "${step_id}"
            return 1
          }
          EOF

      - name: Record launch input
        run: |
          set -euo pipefail
          source .context/game-launch/launch-env.sh
          sync_current_config
          bun config/deployer/clean/cli/launch-run-store.ts --event launch-started "${run_store_args[@]}"

      - name: Create world
        if:
          ${{ github.event.inputs.launch_kind == 'game' && (github.event.inputs.launch_step == 'full' ||
          github.event.inputs.launch_step == 'create-world') }}
        run: |
          set -euo pipefail
          source .context/game-launch/launch-env.sh
          run_create_world_step_with_timeout_retry

      - name: Create series
        if:
          ${{ (github.event.inputs.launch_kind == 'series' || github.event.inputs.launch_kind == 'rotation') &&
          (github.event.inputs.launch_step == 'full' || github.event.inputs.launch_step == 'create-series') }}
        run: |
          set -euo pipefail
          source .context/game-launch/launch-env.sh
          run_launch_step create-series

      - name: Create worlds
        if:
          ${{ (github.event.inputs.launch_kind == 'series' || github.event.inputs.launch_kind == 'rotation') &&
          (github.event.inputs.launch_step == 'full' || github.event.inputs.launch_step == 'create-worlds') }}
        run: |
          set -euo pipefail
          source .context/game-launch/launch-env.sh
          run_create_world_step_with_timeout_retry create-worlds

      - name: Wait for factory index
        if:
          ${{ github.event.inputs.launch_kind == 'game' && (github.event.inputs.launch_step == 'full' ||
          github.event.inputs.launch_step == 'create-world' || github.event.inputs.launch_step ==
          'wait-for-factory-index') }}
        run: |
          set -euo pipefail
          source .context/game-launch/launch-env.sh
          run_launch_step wait-for-factory-index

      - name: Wait for factory indexes
        if:
          ${{ (github.event.inputs.launch_kind == 'series' || github.event.inputs.launch_kind == 'rotation') &&
          (github.event.inputs.launch_step == 'full' || github.event.inputs.launch_step == 'create-series' ||
          github.event.inputs.launch_step == 'create-worlds' || github.event.inputs.launch_step ==
          'wait-for-factory-indexes') }}
        run: |
          set -euo pipefail
          source .context/game-launch/launch-env.sh
          run_launch_step wait-for-factory-indexes

      - name: Configure world
        if:
          ${{ github.event.inputs.launch_kind == 'game' && (github.event.inputs.launch_step == 'full' ||
          github.event.inputs.launch_step == 'create-world' || github.event.inputs.launch_step ==
          'wait-for-factory-index' || github.event.inputs.launch_step == 'configure-world') }}
        run: |
          set -euo pipefail
          source .context/game-launch/launch-env.sh
          run_launch_step configure-world

      - name: Configure worlds
        if:
          ${{ (github.event.inputs.launch_kind == 'series' || github.event.inputs.launch_kind == 'rotation') &&
          (github.event.inputs.launch_step == 'full' || github.event.inputs.launch_step == 'create-series' ||
          github.event.inputs.launch_step == 'create-worlds' || github.event.inputs.launch_step ==
          'wait-for-factory-indexes' || github.event.inputs.launch_step == 'configure-worlds') }}
        run: |
          set -euo pipefail
          source .context/game-launch/launch-env.sh
          run_launch_step configure-worlds

      - name: Grant loot chest role
        if:
          ${{ github.event.inputs.launch_kind == 'game' && (github.event.inputs.launch_step == 'full' ||
          github.event.inputs.launch_step == 'create-world' || github.event.inputs.launch_step ==
          'wait-for-factory-index' || github.event.inputs.launch_step == 'configure-world' ||
          github.event.inputs.launch_step == 'grant-lootchest-role') }}
        run: |
          set -euo pipefail
          source .context/game-launch/launch-env.sh
          run_launch_step grant-lootchest-role

      - name: Grant loot chest roles
        if:
          ${{ (github.event.inputs.launch_kind == 'series' || github.event.inputs.launch_kind == 'rotation') &&
          (github.event.inputs.launch_step == 'full' || github.event.inputs.launch_step == 'create-series' ||
          github.event.inputs.launch_step == 'create-worlds' || github.event.inputs.launch_step ==
          'wait-for-factory-indexes' || github.event.inputs.launch_step == 'configure-worlds' ||
          github.event.inputs.launch_step == 'grant-lootchest-roles') }}
        run: |
          set -euo pipefail
          source .context/game-launch/launch-env.sh
          run_launch_step grant-lootchest-roles

      - name: Grant village pass roles
        if:
          ${{ github.event.inputs.launch_kind == 'game' && endsWith(github.event.inputs.environment, '.eternum') &&
          (github.event.inputs.launch_step == 'full' || github.event.inputs.launch_step == 'create-world' ||
          github.event.inputs.launch_step == 'wait-for-factory-index' || github.event.inputs.launch_step ==
          'configure-world' || github.event.inputs.launch_step == 'grant-lootchest-role' ||
          github.event.inputs.launch_step == 'grant-village-pass-role') }}
        run: |
          set -euo pipefail
          source .context/game-launch/launch-env.sh
          run_launch_step grant-village-pass-role

      - name: Grant village pass roles for series
        if:
          ${{ (github.event.inputs.launch_kind == 'series' || github.event.inputs.launch_kind == 'rotation') &&
          endsWith(github.event.inputs.environment, '.eternum') && (github.event.inputs.launch_step == 'full' ||
          github.event.inputs.launch_step == 'create-series' || github.event.inputs.launch_step == 'create-worlds' ||
          github.event.inputs.launch_step == 'wait-for-factory-indexes' || github.event.inputs.launch_step ==
          'configure-worlds' || github.event.inputs.launch_step == 'grant-lootchest-roles' ||
          github.event.inputs.launch_step == 'grant-village-pass-roles') }}
        run: |
          set -euo pipefail
          source .context/game-launch/launch-env.sh
          run_launch_step grant-village-pass-roles

      - name: Create banks
        if:
          ${{ endsWith(github.event.inputs.environment, '.eternum') && (github.event.inputs.launch_step == 'full' ||
          github.event.inputs.launch_step == 'create-world' || github.event.inputs.launch_step ==
          'wait-for-factory-index' || github.event.inputs.launch_step == 'configure-world' ||
          github.event.inputs.launch_step == 'grant-lootchest-role' || github.event.inputs.launch_step ==
          'grant-village-pass-role' || github.event.inputs.launch_step == 'create-series' ||
          github.event.inputs.launch_step == 'create-worlds' || github.event.inputs.launch_step ==
          'wait-for-factory-indexes' || github.event.inputs.launch_step == 'configure-worlds' ||
          github.event.inputs.launch_step == 'grant-lootchest-roles' || github.event.inputs.launch_step ==
          'grant-village-pass-roles' || github.event.inputs.launch_step == 'create-banks') }}
        run: |
          set -euo pipefail
          source .context/game-launch/launch-env.sh
          run_launch_step create-banks

      - name: Create indexer
        if:
          ${{ github.event.inputs.launch_kind == 'game' && (github.event.inputs.launch_step == 'full' ||
          github.event.inputs.launch_step == 'create-world' || github.event.inputs.launch_step ==
          'wait-for-factory-index' || github.event.inputs.launch_step == 'configure-world' ||
          github.event.inputs.launch_step == 'grant-lootchest-role' || github.event.inputs.launch_step ==
          'grant-village-pass-role' || github.event.inputs.launch_step == 'create-banks' ||
          github.event.inputs.launch_step == 'create-indexer') }}
        run: |
          set -euo pipefail
          source .context/game-launch/launch-env.sh
          run_launch_step create-indexer

      - name: Create indexers
        if:
          ${{ (github.event.inputs.launch_kind == 'series' || github.event.inputs.launch_kind == 'rotation') &&
          (github.event.inputs.launch_step == 'full' || github.event.inputs.launch_step == 'create-series' ||
          github.event.inputs.launch_step == 'create-worlds' || github.event.inputs.launch_step ==
          'wait-for-factory-indexes' || github.event.inputs.launch_step == 'configure-worlds' ||
          github.event.inputs.launch_step == 'grant-lootchest-roles' || github.event.inputs.launch_step ==
          'grant-village-pass-roles' || github.event.inputs.launch_step == 'create-banks' ||
          github.event.inputs.launch_step == 'create-indexers') }}
        run: |
          set -euo pipefail
          source .context/game-launch/launch-env.sh
          run_launch_step create-indexers

      - name: Sync paymaster
        if:
          ${{ startsWith(github.event.inputs.environment, 'mainnet.') && (github.event.inputs.launch_step == 'full' ||
          github.event.inputs.launch_step == 'create-world' || github.event.inputs.launch_step ==
          'wait-for-factory-index' || github.event.inputs.launch_step == 'configure-world' ||
          github.event.inputs.launch_step == 'grant-lootchest-role' || github.event.inputs.launch_step ==
          'grant-village-pass-role' || github.event.inputs.launch_step == 'create-series' ||
          github.event.inputs.launch_step == 'create-worlds' || github.event.inputs.launch_step ==
          'wait-for-factory-indexes' || github.event.inputs.launch_step == 'configure-worlds' ||
          github.event.inputs.launch_step == 'grant-lootchest-roles' || github.event.inputs.launch_step ==
          'grant-village-pass-roles' || github.event.inputs.launch_step == 'create-banks' ||
          github.event.inputs.launch_step == 'create-indexer' || github.event.inputs.launch_step == 'create-indexers' ||
          github.event.inputs.launch_step == 'sync-paymaster') }}
        env:
          SLOT_AUTH: ${{ secrets.SLOT_AUTH }}
        run: |
          set -euo pipefail
          source .context/game-launch/launch-env.sh
          run_launch_step sync-paymaster

      - name: Upload launch summary
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: game-launch-summary
          path: .context/game-launch/*.json
          if-no-files-found: warn
