    <style>
      html[data-boot-state="booting"] body,
      html[data-boot-state="react-mounted"] body {
        background: #050709;
      }

      #boot-shell {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        overflow: hidden;
        background:
          radial-gradient(circle at center, rgba(182, 150, 86, 0.08), transparent 42%),
          linear-gradient(180deg, #040607 0%, #070b0d 54%, #050709 100%);
        color: rgba(240, 224, 189, 0.92);
        transition:
          opacity 360ms ease,
          visibility 360ms ease;
        font-family:
          "Space Grotesk",
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      html[data-boot-state="app-loading"] #boot-shell,
      html[data-boot-state="app-ready"] #boot-shell {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .boot-shell-grid,
      .boot-shell-contours,
      .boot-shell-vignette,
      .boot-shell-content {
        position: absolute;
        inset: 0;
      }

      .boot-shell-grid {
        background-image:
          linear-gradient(rgba(201, 169, 96, 0.06) 1px, transparent 1px),
          linear-gradient(90deg, rgba(201, 169, 96, 0.06) 1px, transparent 1px);
        background-position: center center;
        background-size: 96px 96px;
        mask-image: radial-gradient(circle at center, rgba(0, 0, 0, 0.45) 24%, transparent 82%);
        opacity: 0.28;
      }

      .boot-shell-vignette {
        background:
          radial-gradient(circle at center, transparent 0%, rgba(0, 0, 0, 0) 36%, rgba(0, 0, 0, 0.72) 100%),
          linear-gradient(90deg, rgba(0, 0, 0, 0.22), transparent 35%, transparent 65%, rgba(0, 0, 0, 0.22));
      }

      .boot-shell-content {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }

      .boot-shell-panel {
        position: relative;
        z-index: 1;
        width: min(34rem, 100%);
        border: 1px solid rgba(201, 169, 96, 0.16);
        border-radius: 16px;
        background: rgba(7, 10, 12, 0.75);
        box-shadow:
          0 24px 80px rgba(0, 0, 0, 0.55),
          0 0 1px rgba(201, 169, 96, 0.15);
        backdrop-filter: blur(22px);
        padding: 2.25rem 2rem;
        text-align: center;
      }

      .boot-shell-caption {
        margin-bottom: 0.5rem;
        color: rgba(201, 169, 96, 0.35);
        font-size: 0.6rem;
        letter-spacing: 0.5em;
        text-transform: uppercase;
      }

      .boot-shell-title {
        margin: 0;
        color: rgba(240, 224, 189, 0.9);
        font-size: clamp(1.15rem, 2vw, 1.35rem);
        font-weight: 600;
        letter-spacing: 0.1em;
      }

      .boot-shell-subtitle {
        margin: 0.9rem auto 0;
        max-width: 26rem;
        color: rgba(236, 224, 194, 0.72);
        font-size: 0.95rem;
        line-height: 1.5;
      }

      .boot-shell-brackets {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.6rem;
        margin-top: 1.65rem;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }

      .boot-shell-bracket-symbol {
        color: rgba(201, 169, 96, 0.3);
        font-size: 1.24rem;
        line-height: 1;
      }

      .boot-shell-segments {
        display: flex;
        align-items: center;
        gap: 0.375rem;
      }

      .boot-shell-segment {
        width: 1.25rem;
        height: 0.75rem;
        border: 1px solid rgba(201, 169, 96, 0.15);
        border-radius: 3px;
        background: rgba(201, 169, 96, 0.04);
        animation: boot-shell-segment-sweep 1.6s ease-in-out infinite;
      }

      .boot-shell-segment:nth-child(1) {
        animation-delay: 0ms;
      }
      .boot-shell-segment:nth-child(2) {
        animation-delay: 140ms;
      }
      .boot-shell-segment:nth-child(3) {
        animation-delay: 280ms;
      }
      .boot-shell-segment:nth-child(4) {
        animation-delay: 420ms;
      }
      .boot-shell-segment:nth-child(5) {
        animation-delay: 560ms;
      }
      .boot-shell-segment:nth-child(6) {
        animation-delay: 700ms;
      }
      .boot-shell-segment:nth-child(7) {
        animation-delay: 840ms;
      }
      .boot-shell-segment:nth-child(8) {
        animation-delay: 980ms;
      }

      .boot-shell-contours svg {
        width: 100%;
        height: 100%;
      }

      .boot-shell-group-a {
        animation: boot-shell-drift-a 28s ease-in-out infinite alternate;
      }
      .boot-shell-group-b {
        animation: boot-shell-drift-b 34s ease-in-out infinite alternate;
      }
      .boot-shell-group-c {
        animation: boot-shell-drift-c 40s ease-in-out infinite alternate;
      }
      .boot-shell-group-d {
        animation: boot-shell-drift-d 24s ease-in-out infinite alternate;
      }
      .boot-shell-group-e {
        animation: boot-shell-drift-e 36s ease-in-out infinite alternate;
      }

      .boot-shell-contour-path {
        fill: none;
        stroke: rgba(201, 169, 96, 0.85);
        stroke-width: 1.2;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: 8 14 64 20 32 12;
        filter: drop-shadow(0 0 3px rgba(201, 169, 96, 0.12));
        animation: boot-shell-contour-flow 32s linear infinite;
      }

      .boot-shell-contour-path.echo {
        stroke-width: 0.8;
        filter: none;
      }

      .boot-shell-contour-path.particle {
        stroke-dasharray: 4 8 20 10;
        animation: boot-shell-particle-flow 18s linear infinite;
        filter: drop-shadow(0 0 2px rgba(201, 169, 96, 0.08));
      }

      @keyframes boot-shell-contour-flow {
        from {
          stroke-dashoffset: 0;
        }
        to {
          stroke-dashoffset: -280;
        }
      }

      @keyframes boot-shell-particle-flow {
        from {
          stroke-dashoffset: 0;
        }
        to {
          stroke-dashoffset: -160;
        }
      }

      @keyframes boot-shell-drift-a {
        from {
          transform: translate3d(-2%, -1.2%, 0) scale(1.01);
        }
        to {
          transform: translate3d(2.2%, 1.8%, 0) scale(1.06);
        }
      }

      @keyframes boot-shell-drift-b {
        from {
          transform: translate3d(1.8%, -1.5%, 0) scale(1.04);
        }
        to {
          transform: translate3d(-1.6%, 1.3%, 0) scale(1.01);
        }
      }

      @keyframes boot-shell-drift-c {
        from {
          transform: translate3d(-1.2%, 1.5%, 0) scale(1.02);
        }
        to {
          transform: translate3d(1.5%, -1.4%, 0) scale(1.06);
        }
      }

      @keyframes boot-shell-drift-d {
        from {
          transform: translate3d(0.8%, -2%, 0) scale(1.03);
        }
        to {
          transform: translate3d(-1.8%, 0.6%, 0) scale(1.05);
        }
      }

      @keyframes boot-shell-drift-e {
        from {
          transform: translate3d(-1.6%, 0.4%, 0) scale(1.05);
        }
        to {
          transform: translate3d(1.2%, -1.8%, 0) scale(1.02);
        }
      }

      @keyframes boot-shell-segment-sweep {
        0%,
        100% {
          background: rgba(11, 14, 18, 0.08);
          border-color: rgba(201, 169, 96, 0.3);
          box-shadow: none;
          transform: translateY(0);
        }
        35%,
        55% {
          background: linear-gradient(180deg, rgba(246, 220, 147, 0.86) 0%, rgba(199, 157, 69, 0.92) 100%);
          border-color: rgba(236, 204, 131, 0.92);
          box-shadow:
            0 0 16px rgba(201, 169, 96, 0.24),
            inset 0 0 0 1px rgba(255, 247, 224, 0.16);
          transform: translateY(-1px);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .boot-shell-group-a,
        .boot-shell-group-b,
        .boot-shell-group-c,
        .boot-shell-group-d,
        .boot-shell-group-e,
        .boot-shell-contour-path,
        .boot-shell-segment {
          animation: none !important;
        }
      }
    </style>
